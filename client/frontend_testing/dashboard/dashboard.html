<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stray Rescue Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL STYLES
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f6fb;
    display:flex;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:280px;
    height:100vh;
    background:#111827;
    color:white;
    position:fixed;
    left:0;
    top:0;
    overflow-y:auto;
    padding:25px 15px;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:35px;
    text-align:center;
}

.sidebar-title{
    font-size:13px;
    color:#9ca3af;
    margin:20px 10px 10px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin-bottom:8px;
}

.sidebar ul li a{
    text-decoration:none;
    color:#d1d5db;
    display:block;
    padding:13px 16px;
    border-radius:12px;
    transition:0.3s;
}

.sidebar ul li a:hover,
.sidebar ul li a.active{
    background:#2563eb;
    color:white;
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{
    margin-left:280px;
    width:calc(100% - 280px);
    padding:35px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.admin-box{
    background:white;
    padding:12px 20px;
    border-radius:14px;
}

/* =========================
   CARDS
========================= */

.personal-card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:20px;
}

.personal-header{
    display:flex;
    gap:25px;
    align-items:center;
    margin-bottom:25px;
}

.personal-header img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2563eb;
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.info-box{
    background:#f9fafb;
    padding:15px;
    border-radius:12px;
}

.bio-box{
    margin-top:20px;
    background:#f9fafb;
    padding:15px;
    border-radius:12px;
}

/* =========================
   ADOPTION PANEL
========================= */

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:12px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){
    .info-grid{
        grid-template-columns:1fr;
    }

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main-content{
        margin-left:0;
        width:100%;
    }
}

</style>

</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

    <div class="logo">🐾 Stray Rescue</div>

    <div class="sidebar-title">Main</div>
    <ul>
        <li><a href="#" class="active">Personal Info</a></li>
    </ul>

    <div class="sidebar-title">Adoption System</div>
    <ul>
        <li><a href="#" onclick="showAdoptionPanel()">Assign Adoption Point</a></li>
    </ul>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <div class="admin-box">Admin Panel</div>
    </div>

    <!-- =========================
         PERSONAL INFO PANEL
    ========================= -->

    <div class="personal-card">

        <div class="personal-header">

            <img id="profile_image" src="">

            <div>
                <h2 id="emp_name">Loading...</h2>
                <p id="emp_rank">Loading...</p>
            </div>

        </div>

        <div class="info-grid">

            <div class="info-box">
                <h4>Email</h4>
                <p id="email"></p>
            </div>

            <div class="info-box">
                <h4>Salary</h4>
                <p id="salary"></p>
            </div>

            <div class="info-box">
                <h4>Supervisor</h4>
                <p id="supervisor_name"></p>
            </div>

            <div class="info-box">
                <h4>Supervisor Email</h4>
                <p id="supervisor_email"></p>
            </div>

        </div>

        <div class="bio-box">
            <h4>Bio</h4>
            <p id="emp_bio"></p>
        </div>

    </div>

    <!-- =========================
         ADOPTION PANEL
    ========================= -->

    <div class="personal-card" id="adoption_panel" style="display:none;">

        <h2>Assign Adoption Point Location</h2>

        <div class="info-grid">

            <div class="info-box">
                <h4>Latitude</h4>
                <input id="adopt_lat">
            </div>

            <div class="info-box">
                <h4>Longitude</h4>
                <input id="adopt_lng">
            </div>

            <div class="info-box">
                <h4>Animal ID</h4>
                <input id="animal_id">
            </div>

        </div>

        <button onclick="assignAdoptionPoint()">Assign Location</button>

        <p id="adopt_msg"></p>

    </div>

</div>

<!-- =========================
         JAVASCRIPT
========================= -->

<script>

/* =========================
   LOAD EMPLOYEE INFO
========================= */

async function loadPersonalInfo(){

    try{

        const response = await fetch(
            'http://localhost/dashboard/admin_dashboard/getEmployee.php'
        );

        const data = await response.json();

        document.getElementById('emp_name').innerText = data.emp_name;
        document.getElementById('emp_rank').innerText = "Rank: " + data.emp_rank;
        document.getElementById('email').innerText = data.email;
        document.getElementById('salary').innerText = data.salary;
        document.getElementById('emp_bio').innerText = data.emp_bio;

        document.getElementById('supervisor_name').innerText = data.supervisor_name;
        document.getElementById('supervisor_email').innerText = data.supervisor_email;

        document.getElementById('profile_image').src = data.emp_profile_picture_link;

    }catch(err){
        console.log(err);
    }
}

loadPersonalInfo();


/* =========================
   SHOW ADOPTION PANEL
========================= */

function showAdoptionPanel(){
    document.getElementById('adoption_panel').style.display = 'block';
}


/* =========================
   ASSIGN ADOPTION POINT
========================= */

async function assignAdoptionPoint(){

    const lat = document.getElementById('adopt_lat').value;
    const lng = document.getElementById('adopt_lng').value;
    const animal_id = document.getElementById('animal_id').value;

    try{

        const response = await fetch(
            'http://localhost/dashboard/admin_dashboard/assignAdoptionPoint.php',
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body: JSON.stringify({
                    latitude: lat,
                    longitude: lng,
                    animal_id: animal_id
                })
            }
        );

        const data = await response.json();

        document.getElementById('adopt_msg').innerText = data.msg;

    }catch(err){
        console.log(err);
        document.getElementById('adopt_msg').innerText = "Error assigning location";
    }
}

</script>

</body>
</html>
