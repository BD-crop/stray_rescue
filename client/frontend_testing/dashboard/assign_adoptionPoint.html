<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assign Rescue Point</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet">

<style>

body{
    background:#eef2f7;
}

.container{
    max-width:1200px;
}

.card{
    border:none;
    border-radius:12px;
    background:#ffffff;
}

.form-control{
    border:2px solid #d0d7e2;
    padding:10px;
    box-shadow:none;
}

.form-control:focus{
    border-color:#1a73e8;
    box-shadow:0 0 0 .2rem rgba(26,115,232,.15);
}

#map-wrapper{
    position:relative;
    width:100%;
    min-height:450px;
}

#map{
    width:100%;
    height:450px;
    border-radius:12px;
    overflow:hidden;
}

.location-badge{
    background:#e8f0fe;
    color:#1a73e8;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    margin-bottom:15px;
}

.search-results{
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    margin-top:6px;
    background:#fff;
    border-radius:12px;
    border:1px solid #dbe4f0;
    z-index:999;
    display:none;
}

.search-item{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #eef2f7;
}

.search-item:hover{
    background:#f3f8ff;
}

.manager-card{
    border:1px solid #dbe4f0;
    border-radius:10px;
    padding:15px;
    background:#f8fbff;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark shadow-sm" style="background:#1a73e8">
    <div class="container-fluid">
        <span class="navbar-brand">Assign Rescue Point</span>
    </div>
</nav>

<div class="container mt-5">

<div class="row g-4">

<!-- LEFT -->
<div class="col-lg-5">

<form class="card p-4 shadow-sm" id="rescueForm">

<h4 class="mb-4 text-center">Assign Rescue Point</h4>

<label>Rescue Point Name</label>
<input class="form-control mb-3" name="rescue_point_name" id="rescue_point_name" required>

<label>Assign Manager</label>

<div class="position-relative mb-3">

<div class="d-flex gap-2">
    <input class="form-control" id="managerSearch" placeholder="Search employee...">
    <button type="button" class="btn btn-primary" id="searchManagerBtn">Search</button>
</div>

<div id="searchResults" class="search-results"></div>

</div>

<div class="manager-card mb-3" id="selectedManagerBox" style="display:none;">
    Assigned: <strong id="selectedManagerName"></strong>
</div>

<input type="hidden" id="manager_id" name="manager_id">
<input type="hidden" id="latitude" name="latitude">
<input type="hidden" id="longitude" name="longitude">

<button class="btn btn-primary w-100" type="submit">
Save Rescue Point
</button>

</form>

</div>

<!-- RIGHT -->
<div class="col-lg-6">

<div class="card p-3 shadow-sm">

<div class="location-badge">
Click map to assign rescue point inside Bangladesh
</div>

<h5 id="Location_shown">Dhaka, Bangladesh</h5>

<div id="map-wrapper">
    <div id="map"></div>
</div>

</div>

</div>

</div>

</div>

<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

<script>

/* ================= MAP ================= */

const defaultLng = 90.4125;
const defaultLat = 23.8103;

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [defaultLng, defaultLat],
    zoom: 6.5,
    maxBounds: [[88.0, 20.5],[92.8, 26.8]]
});

map.addControl(new maplibregl.NavigationControl());

const marker = new maplibregl.Marker({draggable:true, color:"#1a73e8"})
.setLngLat([defaultLng, defaultLat])
.addTo(map);

function resetMarker(){
    marker.setLngLat([defaultLng, defaultLat]);
    map.flyTo({ center:[defaultLng, defaultLat], zoom:6.5 });
}

function updateLocation(lat,lng){
    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lng;
}

/* OUT OF BOUNDS CHECK (KEEPED AS YOU WANTED) */
async function checkLocation(lat,lng){

    const res = await fetch(`http://localhost:80/dashboard/proxy/proxy.php?lat=${lat}&lng=${lng}`);
    const data = await res.json();

    if(!data.address || data.address.country_code !== "bd"){
        resetMarker();
        alert("Only Bangladesh allowed");
        return false;
    }

    return true;
}

/* MAP EVENTS */
map.on('click', async (e) => {
    const ok = await checkLocation(e.lngLat.lat, e.lngLat.lng);
    if(!ok) return;

    marker.setLngLat(e.lngLat);
    updateLocation(e.lngLat.lat, e.lngLat.lng);
});

marker.on('dragend', async () => {
    const pos = marker.getLngLat();
    const ok = await checkLocation(pos.lat, pos.lng);
    if(!ok) return;

    updateLocation(pos.lat, pos.lng);
});


/* ================= SEARCH ================= */

const searchBtn = document.getElementById("searchManagerBtn");
const managerSearch = document.getElementById("managerSearch");
const searchResults = document.getElementById("searchResults");

let timer = null;

/* BUTTON */
searchBtn.onclick = () => fetchEmployees(managerSearch.value);

/* LIVE */
managerSearch.addEventListener("input", () => {

    clearTimeout(timer);

    const q = managerSearch.value.trim();

    if(q.length < 2){
        searchResults.style.display = "none";
        return;
    }

    timer = setTimeout(() => fetchEmployees(q), 300);
});

async function fetchEmployees(query){

    const body = `name=${encodeURIComponent(query)}&submit=submit`;

    const res = await fetch(
        "http://localhost:80/dashboard/admin_dashboard/searchEmployees.php",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body
        }
    );

    const data = await res.json();
    renderEmployees(data);
}

function renderEmployees(data){

    searchResults.innerHTML = "";

    if(!data || data.length === 0){
        searchResults.innerHTML = `<div class="search-item">No employee found</div>`;
        searchResults.style.display = "block";
        return;
    }

    data.forEach(emp => {

        const div = document.createElement("div");
        div.className = "search-item";

        div.innerHTML = `
            <strong>${emp.emp_name}</strong><br>
            <small>${emp.email}</small>
        `;

        div.onclick = () => {

            managerSearch.value = emp.emp_name;
            document.getElementById("manager_id").value = emp.emp_id;

            document.getElementById("selectedManagerBox").style.display = "block";
            document.getElementById("selectedManagerName").innerText = emp.emp_name;

            searchResults.style.display = "none";
        };

        searchResults.appendChild(div);
    });

    searchResults.style.display = "block";
}

/* close dropdown */
document.addEventListener("click", (e) => {
    if(!managerSearch.contains(e.target) && !searchResults.contains(e.target)){
        searchResults.style.display = "none";
    }
});


/* ================= SAVE POST (NEW) ================= */

document.getElementById("rescueForm").addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(e.target);

    try {

        const res = await fetch(
            "http://localhost:80/dashboard/admin_dashboard/createRescuePoint.php",
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        alert(data.msg || "Saved successfully");

        console.log(data);

    } catch(err){
        console.error(err);
        alert("Failed to save rescue point");
    }

});

</script>

</body>
</html>
