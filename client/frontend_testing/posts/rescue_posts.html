<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rescue Posts</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }
  .post-card {
    background: #fff;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: flex;
    align-items: flex-start;
  }
  .post-card img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-right: 15px;
  }
  .post-info {
    flex: 1;
  }
  .post-info p {
    margin: 5px 0;
  }
  .btn {
    display: inline-block;
    padding: 8px 15px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  .btn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<h1>Rescue Posts</h1>
<div id="posts-container">Loading posts...</div>
<button id="next-btn" class="btn">Next Page</button>

<script>
let offset = 0;      // page number
const limit = 5;     // posts per page

async function fetchPosts() {
  try {
    const response = await fetch(`http://localhost:80/dashboard/posts/rescue_posts.php?offset=${offset}`);
    const data = await response.json();

    renderPosts(data.posts);

    // Disable next button if we've reached the last post
    document.getElementById('next-btn').disabled = (offset + 1) * limit >= parseInt(data.count);
  } catch (error) {
    console.error('Error fetching posts:', error);
    document.getElementById('posts-container').innerHTML = 'Failed to load posts.';
  }
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  container.innerHTML = ''; // clear previous posts

  if (!posts || posts.length === 0) {
    container.innerHTML = '<p>No posts found.</p>';
    return;
  }

  posts.forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';

    const img = document.createElement('img');
    img.src = post.rescue_post_image_link || 'https://via.placeholder.com/100';
    card.appendChild(img);

    const info = document.createElement('div');
    info.className = 'post-info';
    info.innerHTML = `
      <p><strong>Post:</strong> ${post.rescue_post || 'No description'}</p>
      <p><strong>Species:</strong> ${post.animal_species_type || '-'}</p>
      <p><strong>Gender:</strong> ${post.animal_gender_type || '-'}</p>
      <p><strong>Age:</strong> ${post.animal_age || '-'}</p>
      <p><strong>Timestamp:</strong> ${post.post_time_stamp}</p>
    `;
    card.appendChild(info);

    container.appendChild(card);
  });
}

document.getElementById('next-btn').addEventListener('click', () => {
  offset++;
  fetchPosts();
});

// initial fetch
fetchPosts();
</script>

</body>
</html>
