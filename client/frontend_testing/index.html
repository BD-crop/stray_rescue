<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>


</head>
<body>



    <h1 id="profile_name">User</h1>
    <h1 id="type1"> type_of_user</h1>
    <img id="profile_image" src="" alt="profile image">



    <script>

        (async function(){
            
            await fetch("http://localhost:80/dashboard/profile/profile.php", {
                    method: 'GET',
            }).then(res => res.json()).then(res =>{
                let obj= res;

                if(obj['msg']==='found'){
                    profile_name.innerText = obj['id'];
                    type1.innerText = obj['type'];
                    profile_image.src=obj['image'];
                    console.log(obj);
                }


            });
        })();

    </script>
</body>
</html>
