<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

<form id="login">
    <select name="type" id="type">
        <option value="Users">user</option>
        <option value="Employee">Employee</option>
        <option value="volunteers">volunteer</option>
    </select>
    <input type="text" name="email" id="email" placeholder="Email">
    <input type="password" name="password" id="password" placeholder="Password">
    <input type="submit" value="Login">
</form>

<div id="result"></div>

<script>
    document.getElementById('login').onsubmit = async (e) => {
        e.preventDefault();

        const type = document.getElementById('type').value;
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        const body = `type=${encodeURIComponent(type)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&submit=submit`;

        const res = await fetch("http://localhost/dashboard/login/login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: body
        });

        const data = await res.json();
        console.log(data);
    };
</script>

</body>
</html>
