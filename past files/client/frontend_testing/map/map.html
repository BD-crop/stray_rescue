<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>All Rescue Point Locations</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- MapLibre -->
    <link
        href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
        rel="stylesheet"
    >

    <style>

        body{
            margin:0;
            background:#eef2f7;
        }

        .navbar{
            background:#1a73e8;
        }

        #map{
            width:100%;
            height:90vh;
        }

        .map-container{
            padding:20px;
        }

        .card{
            border:none;
            border-radius:14px;
            overflow:hidden;
        }

        .marker-popup h6{
            margin:0;
            font-size:15px;
            font-weight:700;
        }

        .marker-popup small{
            color:#6b7280;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark shadow-sm">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">
            Rescue Point Locations
        </span>

    </div>

</nav>

<!-- MAP -->

<div class="container-fluid map-container">

    <div class="card shadow-sm">

        <div id="map"></div>

    </div>

</div>

<!-- MAPLIBRE -->

<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

<script>

/* =========================
   MAP INITIALIZATION
========================= */

const defaultLng = 90.4125;
const defaultLat = 23.8103;

const bangladeshBounds = [
    [88.0, 20.5],
    [92.8, 26.8]
];

const map = new maplibregl.Map({

    container: 'map',

    style: 'https://tiles.openfreemap.org/styles/liberty',

    center: [defaultLng, defaultLat],

    zoom: 6.5,

    maxBounds: bangladeshBounds

});

/* controls */

map.addControl(
    new maplibregl.NavigationControl()
);

/* =========================
   LOAD ALL RESCUE POINTS
========================= */

async function loadRescuePoints(){

    try{

        const res = await fetch(
            "http://localhost:80/dashboard/admin_dashboard/getAllAdoptionPoints.php"
        );

        const data = await res.json();

        console.log(data);

        renderMarkers(data);

    }
    catch(err){

        console.error(err);

        alert("Failed to load rescue points");
    }
}

/* =========================
   RENDER MARKERS
========================= */

function renderMarkers(points){

    if(!points || points.length === 0){

        console.log("No rescue points found");

        return;
    }

    points.forEach(point => {

        const lat =
            parseFloat(point.lat);

        const lng =
            parseFloat(point.lang);

        /* skip invalid */

        if(isNaN(lat) || isNaN(lng))
            return;

        /* create popup */

        const popup = new maplibregl.Popup({
            offset:25
        }).setHTML(`
            <div class="marker-popup">
                <h6>${point.name}</h6>

                <small>
                    Latitude:
                    ${lat}
                    <br>

                    Longitude:
                    ${lng}
                </small>
            </div>
        `);

        /* create marker */

        new maplibregl.Marker({
            color:"#dc3545"
        })
        .setLngLat([lng, lat])
        .setPopup(popup)
        .addTo(map);

    });
}

/* =========================
   START
========================= */

loadRescuePoints();

</script>

</body>
</html>
